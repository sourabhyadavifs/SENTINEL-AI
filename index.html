<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        var suppressError = function(message, source) {
          var msg = String(message || '');
          var src = String(source || '');
          return (
            msg.indexOf('Script error.') !== -1 ||
            !source ||
            src.indexOf('extension') !== -1 ||
            src.indexOf('chrome-extension') !== -1 ||
            src.indexOf('chrome') !== -1 ||
            src.indexOf('browser-sync') !== -1 ||
            src.indexOf('livereload') !== -1 ||
            src.indexOf(window.location.origin) === -1
          );
        };
        window.addEventListener('error', function(event) {
          if (suppressError(event.message, event.filename)) {
            event.preventDefault();
            event.stopPropagation();
            if (event.stopImmediatePropagation) {
              event.stopImmediatePropagation();
            }
          }
        }, true);
        window.addEventListener('unhandledrejection', function(event) {
          event.preventDefault();
          event.stopPropagation();
          if (event.stopImmediatePropagation) {
            event.stopImmediatePropagation();
          }
        }, true);
        var oldOnError = window.onerror;
        window.onerror = function(message, source, lineno, colno, error) {
          if (suppressError(message, source)) {
            return true;
          }
          if (oldOnError) {
            return oldOnError.apply(this, arguments);
          }
          return false;
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
